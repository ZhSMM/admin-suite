name: Release

# v0.7.3+: This workflow is **manual-only** — pushes to `main` no longer
# publish releases. An intentional commit =/=> a release; that choice
# is now made explicitly via the Actions tab ("Run workflow") or
# `gh workflow run release.yml`.
#
# The previous behaviour (`on: push: tags: 'v*'`) coupled every release
# to every commit, which burned Actions minutes on partial fixes and
# produced visible-but-broken release pages whenever the build picked
# up a typo before it was reverted (e.g. v0.7.2's missing </el-table>).
#
# To cut a release:
#   1. Bump src-tauri/tauri.conf.json's `version`.
#   2. Push that commit (and any other commits you want included) to main.
#   3. Either click "Run workflow" in the Actions tab OR run:
#        gh workflow run release.yml --ref main
#
# To **rebuild** an existing release without changing the version
# (e.g. after fixing a flaky build, or re-running on a clean runner),
# pass `version: vX.Y.Z` and leave `create_release: false` — the
# run will just upload artifacts you can download from the Actions
# page without overwriting the GitHub Release.
#
# This is also where you'd want to wire it back to tag-pushes once you've
# stabilised the project — just add the `push: tags` block back.
#
# Build targets both NSIS and MSI:
#   - NSIS (.exe) — preferred for portable / per-user install
#   - MSI (.msi)   — preferred for Group Policy / corporate deploys
# Both come out of the same `npm run tauri build` invocation.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag name to attach this build to (e.g. v0.7.4). Leave blank to use the version in tauri.conf.json. Used as `tagName` for tauri-action.'
        required: false
        type: string
        default: ''
      create_release:
        description: 'Publish a GitHub Release and upload assets. Set to false to only collect artifacts (use for rebuilds).'
        required: false
        type: boolean
        default: true

permissions:
  contents: write   # required so tauri-action can create the GitHub Release
  actions: read

# Hard cap the whole job — if anything hangs past 30 min, fail fast so we
# don't burn GitHub Actions minutes.
jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 30

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: short

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # v0.7.4: MSI bundling needs WiX 3.x. NSIS is bundled inside the
      # `tauri-cli` crate, but `cargo-tauri` shells out to WiX for MSI.
      #
      # The GitHub-hosted `windows-2025-vs2026` image already ships
      # wixtoolset v3.14.1 in `C:\Program Files (x86)\WiX Toolset v3.14\bin\`,
      # so on a modern runner the install is a no-op. We only run choco
      # if `candle.exe` isn't already on PATH, and we don't pin a version
      # (older runners ship older WiX, newer runners ship newer — pinning
      # collides with either). `wixtoolset` is the v3 chocolatey package;
      # v4 changed the CLI surface and Tauri 1.x doesn't speak it yet.
      - name: Install WiX Toolset 3 (for MSI bundle)
        shell: pwsh
        run: |
          $candle = Get-Command candle.exe -ErrorAction SilentlyContinue
          if ($candle) {
            Write-Host "WiX already on PATH: $($candle.Source)" -ForegroundColor Green
          } else {
            Write-Host "candle.exe not on PATH — installing via chocolatey"
            choco install wixtoolset --no-progress --limit-output
            $candle = Get-Command candle.exe -ErrorAction Stop
            Write-Host "Installed: $($candle.Source)" -ForegroundColor Green
          }
          $light = (Get-Command light.exe -ErrorAction Stop).Source
          Write-Host "light:  $light"
          candle.exe -? | Select-Object -First 1
          light.exe  -? | Select-Object -First 1

      - name: Cache Rust build artefacts
        # Swatinem/rust-cache keys on src-tauri/Cargo.lock so dependency
        # changes invalidate. ~/.cargo/registry is shared across builds.
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Cache node_modules
        # node_modules cache keyed on package-lock.json + .nvmrc-free
        # constraint (we hardcode node-version above).
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-20-

      - name: Install npm dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci
        shell: pwsh

      - name: Validate workflow syntax
        # Cheap sanity check before the slow build — fails fast on yaml errors
        # that would otherwise surface as opaque tauri-action failures.
        run: |
          Write-Host "workflow file OK at $(Get-Date -Format o)"
          Write-Host "node $(node --version)"
          Write-Host "npm  $(npm --version)"
        shell: pwsh

      # -----------------------------------------------------------------------------
      # tauri-apps/tauri-action@v0 wraps:
      #   1. `npm run tauri build` — bundles NSIS .exe + MSI .msi (targets set in
      #      tauri.conf.json)
      #   2. Signs the .exe if TAURI_SIGNING_PRIVATE_KEY is set
      #   3. Creates the GitHub Release when `inputs.create_release == true`
      #      (defaults to true; pass `false` for a rebuild-only run that
      #      only collects artifacts)
      #   4. Uploads the installers + signed .nsis.zip + latest.json as
      #      release assets
      #
      # `tauriUpdaterActive: ${{ secrets.X != '' }}` evaluates to false when
      # the secret is missing, so we ship installers without a signed
      # latest.json in that case (the in-app updater will report "no update
      # available" until the user adds the secret).
      # -----------------------------------------------------------------------------
      - name: Build Tauri bundles + updater artifacts
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.version != '' && inputs.version || (github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_number)) }}
          releaseName: Admin Suite ${{ inputs.version != '' && inputs.version || github.ref_name }}
          releaseBody: |
            Automated build via GitHub Actions.

            ## What's inside
            - **NSIS installer (.exe)** — preferred for portable / per-user install
            - **MSI installer (.msi)** — preferred for Group Policy / corporate deploys
            - **Auto-update** — in-app updater will detect this release via `latest.json`
              (only when `TAURI_SIGNING_PRIVATE_KEY` repo secret is configured)

            ## Default credentials
            Username: `admin`
            Password: `admin123`

            > Change the password on first login.
          releaseDraft: false
          prerelease: false
          tauriUpdaterActive: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
          # Skip creating the GitHub Release when the operator only wants
          # an artifact run (e.g. a manual rebuild of an existing tag).
          # `createsRelease: false` makes tauri-action build + upload
          # artifacts without pushing a Release.
          createsRelease: ${{ inputs.create_release }}
          args: ''

      # -----------------------------------------------------------------------------
      # Diagnostic: dump timing summary + bundle sizes regardless of outcome.
      # On failure, this step still runs because we want to know how far we got.
      # -----------------------------------------------------------------------------
      - name: Summary
        if: always()
        shell: pwsh
        run: |
          $bundle = "src-tauri\target\x86_64-pc-windows-msvc\release\bundle"
          Write-Host "=== bundle contents ==="
          if (Test-Path $bundle) {
            Get-ChildItem $bundle -Recurse -File | Select-Object FullName, @{N='MB';E={[math]::Round($_.Length/1MB,2)}} | Format-Table -AutoSize
          } else {
            Write-Host "(bundle dir not present)"
          }
          Write-Host "=== recent log tail ==="
          Get-Content "$env:GITHUB_STEP_SUMMARY" -ErrorAction SilentlyContinue | Select-Object -Last 50

      # -----------------------------------------------------------------------------
      # Manual workflow_dispatch: tauri-action has nothing to attach to (no
      # tag), so upload the artifacts for inspection. On tag pushes this step
      # is skipped — tauri-action handles uploads to the Release.
      #
      # Both NSIS and MSI bundles are uploaded. The `latest.json` next to
      # them is the signed manifest consumed by the in-app updater.
      # -----------------------------------------------------------------------------
      - name: Upload artifacts (manual run only)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: admin-suite-windows
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/latest.json
          if-no-files-found: warn
          retention-days: 14