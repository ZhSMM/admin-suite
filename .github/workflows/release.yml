name: Release

# Trigger builds on:
#   - Push of a version tag (v*)         -> creates a draft GitHub Release with artifacts
#   - Manual "Run workflow" from web UI  -> just uploads build artifacts (no release)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # required so tauri-action can create the GitHub Release
  actions: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            args: ''
          # Uncomment if you also want 32-bit installers:
          # - target: i686-pc-windows-msvc
          #   args: --target i686-pc-windows-msvc

    env:
      # Path where Tauri's bundler looks for WiX 3 binaries (verified
      # against tauri-bundler v1.6's `wix.rs::get_wix_path`). Pre-populating
      # this with the cache step below sidesteps Tauri's flaky mid-bundle
      # download from github.com/wixtoolset.
      WIX_CACHE: ${{ env.LOCALAPPDATA }}\tauri\WiX

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache Cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci
        shell: pwsh

      # -----------------------------------------------------------------------------
      # Pre-cache WiX 3.14.1 binaries so `tauri build` doesn't have to download
      # them from github.com/wixtoolset mid-bundle. GitHub Actions runners
      # occasionally hit transient network errors hitting that URL (os error
      # 10060); a 1-time install here sidesteps the race. The path matches
      # Tauri's default install location (`~/.cargo/wix/wix3141rtm/`).
      # -----------------------------------------------------------------------------
      - name: Cache WiX 3 binaries
        id: wix-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.WIX_CACHE }}
          key: wix-3.14.1-${{ runner.os }}

      - name: Install WiX 3 (cache miss)
        if: steps.wix-cache.outputs.cache-hit != 'true'
        shell: pwsh
        env:
          WIX_CACHE: ${{ env.LOCALAPPDATA }}\tauri\WiX
        run: |
          $wixDir = $env:WIX_CACHE
          New-Item -ItemType Directory -Force -Path $wixDir | Out-Null
          $zip = Join-Path $env:TEMP "wix314-binaries.zip"
          $urls = @(
            "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip",
            "https://github.com/ZhSMM/wix-mirror/releases/download/wix3141rtm/wix314-binaries.zip"
          )
          $ok = $false
          foreach ($u in $urls) {
            try {
              Write-Host "downloading $u"
              Invoke-WebRequest -Uri $u -OutFile $zip -UseBasicParsing -TimeoutSec 120
              Expand-Archive -Path $zip -DestinationPath $wixDir -Force
              $ok = $true
              break
            } catch {
              Write-Warning "wix download failed from ${u}: $_"
            }
          }
          if (-not $ok) { throw "could not download WiX 3.14.1 from any mirror" }

      # -----------------------------------------------------------------------------
      # The official Tauri action wraps the bundling, signs (if secrets present),
      # creates a draft GitHub Release on tag pushes, and uploads artifacts.
      # When triggered via workflow_dispatch (no tag), it falls back to uploading
      # artifacts via the `tauri-action/upload-artifacts` output we list below.
      #
      # v0.5.7: enable updater artifacts — `tauriUpdater.active: true` causes
      # tauri-action to emit `latest.json` + signed `.msi.zip` / `.nsis.zip`
      # bundles so the in-app updater can fetch them. The signing key is the
      # one generated locally with `tauri signer generate -w` and stored at
      # the `TAURI_SIGNING_PRIVATE_KEY` repo secret. The corresponding public
      # key is already embedded in `src-tauri/tauri.conf.json::tauri.updater.pubkey`.
      # -----------------------------------------------------------------------------
      - name: Build Tauri bundles (MSI + NSIS) + updater artifacts
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_number) }}
          releaseName: 'Admin Suite ${{ github.ref_name }}'
          releaseBody: |
            Automated build via GitHub Actions.

            ## What's inside
            - **MSI installer** (WiX) — preferred for system-wide install
            - **NSIS installer (.exe)** — preferred for portable / per-user install
            - **Auto-update** — in-app updater will detect this release via `latest.json`

            ## Default credentials
            Username: `admin`
            Password: `admin123`

            > Change the password on first login.
          releaseDraft: false
          prerelease: false
          # Auto-update bundling is opt-in: it requires the
          # TAURI_SIGNING_PRIVATE_KEY repo secret to sign `latest.json` and
          # the .msi.zip / .nsis.zip bundles. Until the secret is set, we
          # ship installers only and the in-app updater will report "no
          # update available" (the rest of the IPC monitoring + crash
          # diagnostics features are unaffected).
          tauriUpdaterActive: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
          args: ${{ matrix.args }}

      # On workflow_dispatch (no tag) the tauri-action has nothing to attach to.
      # Upload artifacts manually so manual runs are still useful.
      - name: Upload artifacts (manual run)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: admin-suite-windows-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/latest.json
          if-no-files-found: error
          retention-days: 14